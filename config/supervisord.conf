[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root
environment=LANG="zh_CN.UTF-8",LC_ALL="zh_CN.UTF-8",DISPLAY=":99"

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1920x1080x24 -ac
autorestart=true
priority=100
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.log

[program:openbox]
command=/usr/bin/openbox
environment=DISPLAY=":99",LANG="zh_CN.UTF-8",LC_ALL="zh_CN.UTF-8"
autorestart=true
priority=200
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stdout_logfile=/var/log/supervisor/openbox.log
stderr_logfile=/var/log/supervisor/openbox.log

[program:x11vnc]
command=/app/scripts/launcher.sh "VNC-Server" "%(ENV_ENABLE_VNC)s" /usr/bin/x11vnc -display :99 -forever -shared -rfbport 5900 -passwdfile /config/vnc_password -xkb
priority=300
autorestart=true
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stdout_logfile=/var/log/supervisor/x11vnc.log

[program:novnc]
command=/app/scripts/launcher.sh "noVNC-Proxy" "%(ENV_ENABLE_NOVNC)s" /opt/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
priority=400
autorestart=true
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.log

# [program:qoe]
# command=/app/scripts/wrapper-qoe.sh
# autostart=false
# autorestart=true
# priority=450
# stdout_logfile_maxbytes=10MB
# stdout_logfile_backups=2
# stdout_logfile=/var/log/supervisor/qoe.log
# stderr_logfile=/var/log/supervisor/qoe.log

[program:vdi]
command=/app/scripts/entrypoint-vdi.sh
environment=DISPLAY=":99",CMCCHOME="/opt/chuanyun-vdi-client",LANG="zh_CN.UTF-8",LC_ALL="zh_CN.UTF-8"
autorestart=true
priority=500
startsecs=5
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stdout_logfile=/var/log/supervisor/vdi.log

[program:automation]
command=/app/automation/run_automation.sh
environment=DISPLAY=":99",LANG="zh_CN.UTF-8",LC_ALL="zh_CN.UTF-8"
autorestart=true
priority=600
startsecs=16
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stdout_logfile=/var/log/supervisor/automation.log
stderr_logfile=/var/log/supervisor/automation.log
# supervisorctl stop automation

[include]
files = /etc/supervisor/conf.d/*.conf